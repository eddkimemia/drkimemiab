<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-label="The AI-Powered African by Dr. Edwin Kimemia">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#glow)"/>
  <rect x="28" y="28" width="544" height="844" fill="none" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="40" y="40" width="520" height="820" fill="none" stroke="#22d3ee" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Neural network nodes -->
  <g opacity="0.85">
    <circle cx="180" cy="200" r="6" fill="#22d3ee"/>
    <circle cx="300" cy="160" r="8" fill="#67e8f9"/>
    <circle cx="420" cy="200" r="6" fill="#22d3ee"/>
    <circle cx="220" cy="280" r="5" fill="#22d3ee"/>
    <circle cx="380" cy="280" r="5" fill="#22d3ee"/>
    <circle cx="300" cy="300" r="10" fill="url(#cyan)"/>
    <line x1="180" y1="200" x2="300" y2="160" stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
    <line x1="420" y1="200" x2="300" y2="160" stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
    <line x1="180" y1="200" x2="220" y2="280" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <line x1="420" y1="200" x2="380" y2="280" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <line x1="220" y1="280" x2="300" y2="300" stroke="#22d3ee" stroke-width="1.2" opacity="0.55"/>
    <line x1="380" y1="280" x2="300" y2="300" stroke="#22d3ee" stroke-width="1.2" opacity="0.55"/>
    <line x1="300" y1="160" x2="300" y2="300" stroke="#22d3ee" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Abstract Africa silhouette simplified -->
  <path d="M300 330 C270 335 250 360 248 395 C246 430 255 455 270 480 C285 500 295 520 300 545 C305 520 315 500 330 480 C345 455 354 430 352 395 C350 360 330 335 300 330Z" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.35"/>

  <text x="300" y="590" text-anchor="middle" fill="#67e8f9" font-family="system-ui, -apple-system, sans-serif" font-size="12" letter-spacing="4" font-weight="700">NEW RELEASE</text>
  <line x1="220" y1="610" x2="380" y2="610" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>

  <text x="300" y="660" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700">The AI-Powered</text>
  <text x="300" y="710" text-anchor="middle" fill="#67e8f9" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">African</text>

  <text x="300" y="760" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14">AI transforming healthcare</text>
  <text x="300" y="780" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14">across the continent</text>

  <text x="300" y="840" text-anchor="middle" fill="#22d3ee" font-family="Georgia, 'Times New Roman', serif" font-size="18">Dr. Edwin Kimemia</text>
</svg>
