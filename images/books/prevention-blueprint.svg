<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-label="The Prevention Blueprint by Dr. Edwin Kimemia">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5831"/>
      <stop offset="50%" stop-color="#2d8a4e"/>
      <stop offset="100%" stop-color="#1f6e3b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a45e"/>
      <stop offset="100%" stop-color="#e5b04a"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#grid)"/>
  <rect x="28" y="28" width="544" height="844" fill="none" stroke="#c8a45e" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="40" y="40" width="520" height="820" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Shield with check -->
  <g transform="translate(300,230)">
    <path d="M0 -70 C30 -70 55 -55 55 -25 C55 20 30 55 0 75 C-30 55 -55 20 -55 -25 C-55 -55 -30 -70 0 -70Z" fill="none" stroke="#c8a45e" stroke-width="3"/>
    <path d="M0 -55 C22 -55 40 -44 40 -22 C40 14 20 42 0 58 C-20 42 -40 14 -40 -22 C-40 -44 -22 -55 0 -55Z" fill="#c8a45e" opacity="0.15"/>
    <path d="M-22 0 L-8 16 L26 -18" fill="none" stroke="#e5b04a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="300" y="370" text-anchor="middle" fill="#faf0d5" font-family="system-ui, -apple-system, sans-serif" font-size="12" letter-spacing="4" font-weight="700">ESSENTIAL GUIDE</text>
  <line x1="210" y1="390" x2="390" y2="390" stroke="#c8a45e" stroke-width="1" opacity="0.55"/>

  <text x="300" y="460" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">The Prevention</text>
  <text x="300" y="515" text-anchor="middle" fill="#e5b04a" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700">Blueprint</text>

  <text x="300" y="580" text-anchor="middle" fill="#d3f8de" font-family="system-ui, -apple-system, sans-serif" font-size="15" opacity="0.9">Your step-by-step guide to</text>
  <text x="300" y="604" text-anchor="middle" fill="#d3f8de" font-family="system-ui, -apple-system, sans-serif" font-size="15" opacity="0.9">staying healthy and avoiding disease</text>

  <!-- Checklist accents -->
  <g transform="translate(180,660)" opacity="0.7">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="none" stroke="#c8a45e" stroke-width="1.5"/>
    <path d="M3 7 L6 10 L11 4" fill="none" stroke="#e5b04a" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="0" y="28" width="14" height="14" rx="2" fill="none" stroke="#c8a45e" stroke-width="1.5"/>
    <path d="M3 35 L6 38 L11 32" fill="none" stroke="#e5b04a" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="0" y="56" width="14" height="14" rx="2" fill="none" stroke="#c8a45e" stroke-width="1.5"/>
    <path d="M3 63 L6 66 L11 60" fill="none" stroke="#e5b04a" stroke-width="1.8" stroke-linecap="round"/>
    <text x="28" y="12" fill="#edfcf2" font-family="system-ui, sans-serif" font-size="13">Screenings</text>
    <text x="28" y="40" fill="#edfcf2" font-family="system-ui, sans-serif" font-size="13">Habits that protect</text>
    <text x="28" y="68" fill="#edfcf2" font-family="system-ui, sans-serif" font-size="13">Early action</text>
  </g>

  <line x1="200" y1="780" x2="400" y2="780" stroke="#c8a45e" stroke-width="1" opacity="0.4"/>
  <text x="300" y="820" text-anchor="middle" fill="#faf0d5" font-family="Georgia, 'Times New Roman', serif" font-size="18">Dr. Edwin Kimemia</text>
</svg>
